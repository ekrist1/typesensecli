# yaml-language-server: $schema=https://goreleaser.com/static/schema.json

version: 2

project_name: clisense

builds:
  - id: clisense
    main: .
    binary: clisense
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w

archives:
  - id: linux-archives
    ids:
      - clisense
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
